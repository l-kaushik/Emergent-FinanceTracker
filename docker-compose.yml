version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: finance-tracker-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=finance_tracker
    networks:
      - finance-tracker-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/finance_tracker --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: finance-tracker-app
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=finance_tracker
      - CORS_ORIGINS=*
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SENDER_EMAIL=${SENDER_EMAIL:-onboarding@resend.dev}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - finance-tracker-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  finance-tracker-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
